services:
  # Backend API - .NET 10 Production
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-urbapf}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - urbapf-network

  # Frontend Web - Quasar Production (Nginx inside container)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${API_URL:-http://localhost:5000}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - urbapf-network

  # PostgreSQL con PostGIS
  db:
    image: postgis/postgis:15-3.4
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-urbapf}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - urbapf-network

networks:
  urbapf-network:
    driver: bridge

volumes:
  pgdata:
