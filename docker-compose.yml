version: '3.8'

services:
  backend:
    container_name: urbapf-backend
    image: urbapf-backend:local
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_DAYS: ${JWT_EXPIRY_DAYS}
      ONESIGNAL_APP_ID: ${ONESIGNAL_APP_ID}
      ONESIGNAL_REST_API_KEY: ${ONESIGNAL_REST_API_KEY}
    depends_on:
      - postgres
    networks:
      - urbapf-network

  frontend:
    container_name: urbapf-frontend
    image: urbapf-frontend:local
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - urbapf-network

  postgres:
    container_name: urbapf-postgres
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - urbapf-network

networks:
  urbapf-network:
    driver: bridge

volumes:
  postgres_data:
