services:
  backend:
    container_name: urbapf-backend
    image: urbapf-backend:local
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-urbapf}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_DAYS: ${JWT_EXPIRY_DAYS}
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - urbapf-network

  frontend:
    container_name: urbapf-frontend
    image: urbapf-frontend:local
    ports:
      - "80:80"
      - "443:443"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    networks:
      - urbapf-network

  postgres:
    container_name: urbapf-postgres
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-urbapf}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-urbapf}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - urbapf-network

networks:
  urbapf-network:
    driver: bridge

volumes:
  postgres_data:
